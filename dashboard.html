<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Task Trevor</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    input[type="number"] {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Header updated ── */
    .dash-updated-header {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 3px;
      letter-spacing: 0.5px;
    }

    /* ── Cards ── */
    .dash-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }
    .dash-card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.14);
    }
    .dash-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--cyan);
      box-shadow: 0 0 20px var(--cyan);
    }
    .dash-card-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted);
      margin-bottom: 18px;
    }

    /* ── Greeting ── */
    .dash-greeting {
      font-size: 1rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Income Stat Row ── */
    .dash-stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .dash-stat-cell {
      background: var(--surface2);
      padding: 16px 12px;
      text-align: center;
    }
    .dash-stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .dash-stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--white);
      letter-spacing: 1px;
    }
    .dash-stat-value.green { color: var(--green); }
    .dash-stat-value.red   { color: var(--pink); }

    /* ── Paycheck List ── */
    .dash-paycheck-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .dash-paycheck-row:last-child { border-bottom: none; }
    .dash-paycheck-label { font-size: 0.9rem; color: var(--text); }
    .dash-paycheck-whose {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 3px 8px;
      border-radius: 4px;
      margin-left: 8px;
    }
    .dash-paycheck-whose.his  { background: rgba(0,212,255,0.1); color: var(--cyan); border: 1px solid rgba(0,212,255,0.25); }
    .dash-paycheck-whose.hers { background: rgba(255,77,141,0.1); color: var(--pink); border: 1px solid rgba(255,77,141,0.25); }
    .dash-paycheck-amount { font-family: 'DM Mono', monospace; font-size: 0.95rem; font-weight: 500; color: var(--white); flex-shrink: 0; }

    /* ── Bills ── */
    .dash-bill-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .dash-bill-row:last-child { border-bottom: none; }
    .dash-bill-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .dash-paid-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dash-paid-dot.paid   { background: var(--green); box-shadow: 0 0 6px rgba(0,245,160,0.5); }
    .dash-paid-dot.unpaid { background: var(--muted); }
    .dash-bill-name-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .dash-bill-name { font-size: 0.92rem; font-weight: 500; color: var(--text); }
    .dash-bill-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .dash-bill-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .dash-bill-status { font-family: 'DM Mono', monospace; font-size: 0.65rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 2px; }
    .dash-bill-status.paid   { color: var(--green); }
    .dash-bill-status.unpaid { color: var(--muted); }
    .dash-bill-due { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
    .dash-bill-amount { font-family: 'DM Mono', monospace; font-size: 0.95rem; font-weight: 500; color: var(--white); }
    .dash-bill-pct { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); min-width: 34px; text-align: right; }

    /* ── Bills Footer ── */
    .dash-bills-total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 14px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }
    .dash-bills-total-label { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); font-weight: 500; }
    .dash-bills-total-value { font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 500; color: var(--white); }
    .dash-still-due {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,184,0,0.08);
      border: 1px solid rgba(255,184,0,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--amber);
    }
    .dash-all-paid {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,245,160,0.08);
      border: 1px solid rgba(0,245,160,0.2);
      border-radius: 10px;
      padding: 9px;
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--green);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Funds ── */
    .dash-fund-item {
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
      border-left: 2px solid var(--border);
      padding-left: 14px;
      margin-left: -14px;
    }
    .dash-fund-item:last-child { border-bottom: none; }
    .dash-fund-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 4px;
      gap: 12px;
    }
    .dash-fund-header-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .dash-fund-name { font-size: 0.95rem; font-weight: 600; color: var(--white); }
    .dash-fund-type-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .dash-fund-progress-label { font-family: 'DM Mono', monospace; font-size: 0.88rem; font-weight: 500; color: var(--white); flex-shrink: 0; }
    .dash-fund-meta { display: flex; gap: 20px; margin: 10px 0; flex-wrap: wrap; }
    .dash-fund-meta-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .dash-fund-meta-value { font-size: 0.88rem; font-weight: 500; color: var(--text); }
    .dash-fund-bar-bg { width: 100%; height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 4px; }
    .dash-fund-bar-fill { height: 100%; border-radius: 999px; transition: width 0.5s ease; }
    .dash-fund-bar-label { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); text-align: right; }

    /* ── Charts ── */
    .dash-charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: start;
    }
    .dash-charts-right { display: flex; flex-direction: column; gap: 12px; }
    .dash-chart-wrap { max-width: 180px; margin: 0 auto; }
    .dash-chart-legend { display: flex; flex-direction: column; gap: 7px; margin-top: 18px; }
    .dash-legend-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .dash-legend-left { display: flex; align-items: center; gap: 6px; min-width: 0; }
    .dash-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dash-legend-label { font-size: 0.78rem; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dash-legend-value { font-family: 'DM Mono', monospace; font-size: 0.78rem; font-weight: 500; color: var(--white); flex-shrink: 0; }
    .dash-legend-pct { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); margin-left: 2px; }
    @media (max-width: 480px) {
      .dash-charts-row { grid-template-columns: 1fr; }
      .dash-chart-wrap { max-width: 200px; }
    }

    /* ── Note ── */
    .dash-note-card {
      background: var(--surface);
      border: 1px solid rgba(255,184,0,0.2);
      border-top: 2px solid var(--amber);
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: inset 0 0 60px rgba(255,184,0,0.03);
    }
    .dash-note-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--amber);
      margin-bottom: 10px;
    }
    .dash-note-text { font-size: 0.95rem; color: var(--text); line-height: 1.65; white-space: pre-wrap; }

    /* ── No Data ── */
    .dash-no-data {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 400px) {
      .dash-stat-value { font-size: 1.2rem; }
      .dash-fund-meta  { gap: 14px; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Header (login state) -->
  <header id="login-header" class="site-header">
    <div class="header-inner">
      <div class="wordmark">
        <a href="index.html" style="text-decoration:none;color:inherit;">
          <span class="wordmark-task">Task</span><span class="wordmark-trevor">Trevor</span>
        </a><span class="wordmark-divider"> · </span><span class="wordmark-portal">Dashboard</span>
      </div>
      <div class="nav-menu">
        <button class="nav-menu-btn" id="nav-toggle" aria-expanded="false">☰</button>
        <div class="nav-dropdown" id="nav-dropdown">
          <a href="index.html" class="nav-dropdown-item">Home</a>
          <a href="admin.html" class="nav-dropdown-item">Workspace</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Login -->
  <div id="login-screen" style="display:flex;align-items:center;justify-content:center;padding:24px;min-height:calc(100vh - 73px);position:relative;z-index:1;">
    <div class="login-box">
      <span class="eyebrow" style="text-align:center;display:block;">Dashboard</span>
      <form id="login-form">
        <input type="email" id="email-input" placeholder="Email" required />
        <input type="password" id="password-input" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <p id="login-error"></p>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none;">
    <header class="site-header">
      <div class="header-inner">
        <div>
          <div class="wordmark">
            <a href="index.html" style="text-decoration:none;color:inherit;">
              <span class="wordmark-task">Task</span><span class="wordmark-trevor">Trevor</span>
            </a><span class="wordmark-divider"> · </span><span class="wordmark-portal">Dashboard</span>
          </div>
          <div class="dash-updated-header" id="dash-updated-header"></div>
        </div>
        <button id="logout-btn" class="btn-ghost">Sign Out</button>
      </div>
    </header>
    <main class="container" id="dash-content">
      <div class="dash-no-data">Loading…</div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, doc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import {
      getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2qkcvy9_cgHlt1msPt42QbJTIwlSx5sA",
      authDomain: "work-que-16801.firebaseapp.com",
      projectId: "work-que-16801",
      storageBucket: "work-que-16801.firebasestorage.app",
      messagingSenderId: "283312462855",
      appId: "1:283312462855:web:ee0b71d588338902e1dea2"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    let unsub = null;

    // ── Auth ──
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById("login-header").style.display = "none";
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("dashboard").style.display    = "block";
        startListener();
      } else {
        document.getElementById("dashboard").style.display    = "none";
        document.getElementById("login-header").style.display = "";
        document.getElementById("login-screen").style.display = "flex";
        if (unsub) { unsub(); unsub = null; }
      }
    });

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errEl = document.getElementById("login-error");
      errEl.textContent = "";
      try {
        await signInWithEmailAndPassword(auth,
          document.getElementById("email-input").value,
          document.getElementById("password-input").value);
      } catch {
        errEl.textContent = "Incorrect email or password.";
      }
    });

    document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

    // ── Listener ──
    function startListener() {
      unsub = onSnapshot(doc(db, "finances", "overview"), (snap) => {
        if (!snap.exists()) {
          document.getElementById("dash-content").innerHTML =
            `<div class="dash-no-data">No financial data yet — Trevor will update this soon.</div>`;
          return;
        }
        renderDashboard(snap.data());
      });
    }

    // ── Render ──
    function renderDashboard(data) {
      const paychecks       = data.paychecks        || [];
      const bills           = data.bills            || [];
      const funds           = data.funds            || [];
      const personalSpending = data.personalSpending || [];

      const hisTotal        = paychecks.filter(p => p.whose === "his").reduce((s,p)  => s + (p.amount||0), 0);
      const hersTotal       = paychecks.filter(p => p.whose === "hers").reduce((s,p) => s + (p.amount||0), 0);
      const combined        = hisTotal + hersTotal;
      const totalBills      = bills.reduce((s,b) => s + (b.amount||0), 0);
      const paidBills       = bills.filter(b => b.paid).reduce((s,b) => s + (b.amount||0), 0);
      const unpaid          = totalBills - paidBills;
      const totalSaved      = funds.reduce((s,f) => s + (f.contributed||0), 0);
      const totalSpending   = personalSpending.reduce((s,p) => s + (p.amount||0), 0);
      const totalOut        = totalBills + totalSaved + totalSpending;
      const remaining       = combined - totalOut;

      // Last updated in header
      const updatedEl = document.getElementById("dash-updated-header");
      if (data.updatedAt) {
        updatedEl.textContent = "Updated " + data.updatedAt.toDate().toLocaleString("en-US", {
          month: "short", day: "numeric", year: "numeric",
          hour: "numeric", minute: "2-digit", hour12: true
        });
      } else {
        updatedEl.textContent = "";
      }

      const content = document.getElementById("dash-content");
      content.innerHTML = "";

      // ── Greeting ──
      if (data.greeting) {
        const el = document.createElement("div");
        el.className = "dash-card anim-fadeup";
        el.innerHTML = `<div class="dash-greeting">${escHtml(data.greeting)}</div>`;
        content.appendChild(el);
      }

      // ── Income ──
      const incomeCard = document.createElement("div");
      incomeCard.className = "dash-card anim-fadeup";
      incomeCard.innerHTML = `<div class="dash-card-title">Income This Month</div>`;

      incomeCard.innerHTML += `
        <div class="dash-stat-row">
          <div class="dash-stat-cell">
            <div class="dash-stat-label">His Checks</div>
            <div class="dash-stat-value">${fmt(hisTotal)}</div>
          </div>
          <div class="dash-stat-cell">
            <div class="dash-stat-label">Your Checks</div>
            <div class="dash-stat-value">${fmt(hersTotal)}</div>
          </div>
          <div class="dash-stat-cell">
            <div class="dash-stat-label">Combined</div>
            <div class="dash-stat-value green">${fmt(combined)}</div>
          </div>
        </div>
      `;

      if (paychecks.length > 0) {
        paychecks.forEach(p => {
          const row = document.createElement("div");
          row.className = "dash-paycheck-row";
          row.innerHTML = `
            <span class="dash-paycheck-label">
              ${escHtml(p.label || "Paycheck")}
              <span class="dash-paycheck-whose ${p.whose}">${p.whose === 'his' ? 'His' : 'Hers'}</span>
            </span>
            <span class="dash-paycheck-amount">${fmt(p.amount||0)}</span>
          `;
          incomeCard.appendChild(row);
        });
      }
      content.appendChild(incomeCard);

      // ── Spending Money ──
      if (personalSpending.length > 0) {
        const spCard = document.createElement("div");
        spCard.className = "dash-card anim-fadeup";
        spCard.innerHTML = `<div class="dash-card-title">Her Money</div>`;

        personalSpending.forEach(s => {
          const row = document.createElement("div");
          row.className = "dash-paycheck-row";
          row.innerHTML = `
            <span class="dash-paycheck-label">${escHtml(s.label || "")}</span>
            <span class="dash-paycheck-amount" style="color:var(--pink);">− ${fmt(s.amount||0)}</span>
          `;
          spCard.appendChild(row);
        });

        if (personalSpending.length > 1) {
          const totalRow = document.createElement("div");
          totalRow.style.cssText = "display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid var(--border);margin-top:4px;";
          totalRow.innerHTML = `
            <span style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);font-weight:500;">Total This Month</span>
            <span style="font-family:'DM Mono',monospace;font-size:1rem;font-weight:500;color:var(--pink);">− ${fmt(totalSpending)}</span>
          `;
          spCard.appendChild(totalRow);
        }
        content.appendChild(spCard);
      }

      // ── Bills ──
      if (bills.length > 0) {
        const billsCard = document.createElement("div");
        billsCard.className = "dash-card anim-fadeup";
        billsCard.innerHTML = `<div class="dash-card-title">Bills This Month</div>`;

        const BILL_TAG_COLORS = {
          "Subscription":    { bg: "rgba(109,40,217,0.15)", text: "#a78bfa" },
          "Loan / Credit":   { bg: "rgba(255,184,0,0.12)",  text: "#ffb800" },
          "Utilities":       { bg: "rgba(0,212,255,0.1)",   text: "#00d4ff" },
          "Cost of Living":  { bg: "rgba(0,245,160,0.1)",   text: "#00f5a0" },
          "Insurance":       { bg: "rgba(255,77,141,0.1)",  text: "#ff4d8d" },
          "Rent / Mortgage": { bg: "rgba(74,96,128,0.15)",  text: "#8ba3c0" },
          "Other":           { bg: "rgba(74,96,128,0.12)",  text: "#4a6080" },
        };
        bills.forEach(b => {
          const pct = totalOut > 0 ? Math.round((b.amount / totalOut) * 100) : 0;
          const tagColors = b.tag && BILL_TAG_COLORS[b.tag];
          const tagHtml = tagColors ? `<span class="dash-bill-tag" style="background:${tagColors.bg};color:${tagColors.text};border:1px solid ${tagColors.text}33;">${escHtml(b.tag)}</span>` : "";
          const row = document.createElement("div");
          row.className = "dash-bill-row";
          row.innerHTML = `
            <div class="dash-bill-left">
              <div class="dash-paid-dot ${b.paid ? 'paid' : 'unpaid'}"></div>
              <div style="min-width:0;">
                <div class="dash-bill-name-row"><span class="dash-bill-name">${escHtml(b.name)}</span>${tagHtml}</div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div class="dash-bill-status ${b.paid ? 'paid' : 'unpaid'}">${b.paid ? 'Paid' : 'Unpaid'}</div>
                  ${b.dueDate ? `<div class="dash-bill-due">Due ${escHtml(b.dueDate)}</div>` : ""}
                </div>
              </div>
            </div>
            <div class="dash-bill-right">
              <span class="dash-bill-amount">${fmt(b.amount||0)}</span>
              <span class="dash-bill-pct">${pct}%</span>
            </div>
          `;
          billsCard.appendChild(row);
        });

        // Total paid row
        const totalRow = document.createElement("div");
        totalRow.className = "dash-bills-total-row";
        totalRow.innerHTML = `
          <span class="dash-bills-total-label">Total Bills Paid This Month</span>
          <span class="dash-bills-total-value">${fmt(paidBills)}</span>
        `;
        billsCard.appendChild(totalRow);

        // Still due OR all paid
        if (unpaid > 0) {
          const dueEl = document.createElement("div");
          dueEl.className = "dash-still-due";
          dueEl.innerHTML = `<span>Still Due This Month</span><span>${fmt(unpaid)}</span>`;
          billsCard.appendChild(dueEl);
        } else if (bills.length > 0) {
          const paidEl = document.createElement("div");
          paidEl.className = "dash-all-paid";
          paidEl.textContent = "All bills paid!";
          billsCard.appendChild(paidEl);
        }

        content.appendChild(billsCard);
      }

      // ── Funds ──
      const FUND_COLORS = {
        fund:     { border: "#00d4ff", bg: "rgba(0,212,255,0.1)",  text: "#00d4ff",  label: "Fund" },
        savings:  { border: "#00f5a0", bg: "rgba(0,245,160,0.1)",  text: "#00f5a0",  label: "Savings Account" },
        checking: { border: "#a78bfa", bg: "rgba(167,139,250,0.1)", text: "#a78bfa", label: "Checking" },
        cd:       { border: "#ffb800", bg: "rgba(255,184,0,0.1)",  text: "#ffb800",  label: "CD / Investment" },
        other:    { border: "#4a6080", bg: "rgba(74,96,128,0.15)", text: "#8ba3c0",  label: "Other" },
      };

      if (funds.length > 0) {
        const fundsCard = document.createElement("div");
        fundsCard.className = "dash-card anim-fadeup";
        fundsCard.innerHTML = `<div class="dash-card-title">Savings &amp; Funds</div>`;

        funds.forEach(f => {
          const goal        = f.goal        || 0;
          const monthly     = f.monthly     || 0;
          const contributed = f.contributed || 0;
          const balance     = f.balance     || 0;
          const colors      = FUND_COLORS[f.type] || FUND_COLORS.other;
          const barPct      = goal > 0 ? Math.min((balance / goal) * 100, 100) : 0;
          const metMonthly  = monthly > 0 && contributed >= monthly;

          const el = document.createElement("div");
          el.className = "dash-fund-item";
          el.style.borderLeftColor = colors.border;
          el.innerHTML = `
            <div class="dash-fund-header">
              <div class="dash-fund-header-left">
                <span class="dash-fund-name">${escHtml(f.name)}</span>
                <span class="dash-fund-type-badge" style="background:${colors.bg};color:${colors.text};border:1px solid ${colors.border}33;">${colors.label}</span>
              </div>
              ${goal > 0 ? `<span class="dash-fund-progress-label">${fmt(balance)} / ${fmt(goal)}</span>` : `<span class="dash-fund-progress-label">${fmt(balance)}</span>`}
            </div>
            <div class="dash-fund-meta">
              <div>
                <div class="dash-fund-meta-label">Contributed Per Month</div>
                <div class="dash-fund-meta-value">${fmt(monthly)}/mo</div>
              </div>
              <div>
                <div class="dash-fund-meta-label">This Month</div>
                <div class="dash-fund-meta-value" style="color:${metMonthly ? 'var(--green)' : 'var(--amber)'}">${fmt(contributed)}</div>
              </div>
            </div>
            ${goal > 0 ? `
              <div class="dash-fund-bar-bg">
                <div class="dash-fund-bar-fill" style="width:${barPct}%;background:${colors.border};box-shadow:0 0 8px ${colors.border}66;"></div>
              </div>
            ` : ''}
          `;
          fundsCard.appendChild(el);
        });
        content.appendChild(fundsCard);
      }

      // ── Two Charts Side by Side ──
      if (bills.length > 0 || totalSaved > 0 || combined > 0) {
        const chartsRow = document.createElement("div");
        chartsRow.className = "dash-charts-row";

        // Chart 1: Bill breakdown (bar)
        const billsChartCard = document.createElement("div");
        billsChartCard.className = "dash-card";
        billsChartCard.innerHTML = `
          <div class="dash-card-title">Bill Breakdown</div>
          <div id="bills-chart-wrap" style="position:relative;min-height:60px;"><canvas id="bills-chart"></canvas></div>
        `;

        // Chart 2: In vs Out
        const flowChartCard = document.createElement("div");
        flowChartCard.className = "dash-card";
        flowChartCard.innerHTML = `
          <div class="dash-card-title">In vs. Out</div>
          <div class="dash-chart-wrap"><canvas id="flow-chart"></canvas></div>
          <div class="dash-chart-legend" id="flow-legend"></div>
        `;

        // Chart 3: Bills by Tag
        const tagChartCard = document.createElement("div");
        tagChartCard.className = "dash-card";
        tagChartCard.innerHTML = `
          <div class="dash-card-title">Bills by Tag</div>
          <div class="dash-chart-wrap"><canvas id="tag-chart"></canvas></div>
          <div class="dash-chart-legend" id="tag-legend"></div>
        `;

        const rightCol = document.createElement("div");
        rightCol.className = "dash-charts-right";
        rightCol.appendChild(flowChartCard);
        rightCol.appendChild(tagChartCard);

        chartsRow.appendChild(billsChartCard);
        chartsRow.appendChild(rightCol);
        content.appendChild(chartsRow);
        const billsLeftover = combined - totalBills - totalSpending;
        setTimeout(() => {
          renderBillsChart(bills, totalSpending, totalSaved, remaining, combined);
          renderFlowChart(combined, totalBills, totalSpending, billsLeftover);
          renderTagChart(bills);
        }, 50);
      }

      // ── Note ──
      if (data.note) {
        const noteCard = document.createElement("div");
        noteCard.className = "dash-note-card anim-fadeup";
        noteCard.innerHTML = `<div class="dash-note-label">Note from Trevor</div><div class="dash-note-text"></div>`;
        noteCard.querySelector(".dash-note-text").textContent = data.note;
        content.appendChild(noteCard);
      }
    }

    // ── Charts ──
    const BILL_COLORS = [
      "#ffb800","#ff9500","#ff4d8d","#c084fc","#818cf8",
      "#00d4ff","#00f5a0","#34d399","#60a5fa","#f472b6",
      "#fbbf24","#fb923c","#f43f5e","#a78bfa","#38bdf8"
    ];

    let billsChart = null;
    let flowChart  = null;
    let tagChart   = null;

    // ── Chart defaults for dark theme ──
    Chart.defaults.color = "#4a6080";
    Chart.defaults.borderColor = "rgba(255,255,255,0.06)";

    // ── Doughnut (In vs. Out) ──
    function makeDoughnut(canvasId, segments, colors, legendId, income) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || segments.length === 0) return null;
      const c = new Chart(ctx, {
        type: "doughnut",
        data: { datasets: [{ data: segments.map(s => Math.max(0, s.val)), backgroundColor: colors, borderWidth: 0, hoverOffset: 5 }] },
        options: {
          cutout: "62%",
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (c) => ` ${segments[c.dataIndex].label}: ${fmt(c.parsed)}` } }
          }
        }
      });
      const legendEl = document.getElementById(legendId);
      if (legendEl) {
        segments.forEach(({ label, val }, i) => {
          const pct = income > 0 ? Math.round((Math.abs(val) / income) * 100) : 0;
          const isNeg = val < 0;
          const row = document.createElement("div");
          row.className = "dash-legend-row";
          row.innerHTML = `
            <div class="dash-legend-left">
              <div class="dash-legend-dot" style="background:${colors[i]}"></div>
              <span class="dash-legend-label">${escHtml(label)}</span>
            </div>
            <div>
              <span class="dash-legend-value" style="${isNeg ? 'color:var(--pink);' : ''}">${isNeg ? '−' : ''}${fmt(Math.abs(val))}</span>
              <span class="dash-legend-pct">${pct}%</span>
            </div>
          `;
          legendEl.appendChild(row);
        });
      }
      return c;
    }

    // ── Horizontal Bar (Bill Breakdown) ──
    function makeBarChart(canvasId, items, colors) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || items.length === 0) return null;
      const wrap = document.getElementById("bills-chart-wrap");
      if (wrap) wrap.style.height = `${items.length * 36 + 20}px`;
      return new Chart(ctx, {
        type: "bar",
        data: {
          labels: items.map(i => i.label),
          datasets: [{
            data: items.map(i => i.val),
            backgroundColor: colors,
            borderRadius: 4,
            borderSkipped: false,
          }]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: (c) => ` ${c.label}: ${fmt(c.parsed.x)}` } }
          },
          scales: {
            x: {
              beginAtZero: true,
              ticks: { callback: (v) => "$" + Math.round(v).toLocaleString(), color: "#4a6080" },
              grid: { color: "rgba(255,255,255,0.05)" }
            },
            y: { grid: { display: false }, ticks: { color: "#4a6080" } }
          }
        }
      });
    }

    function renderBillsChart(bills, totalSpending, totalSaved, remaining, income) {
      if (billsChart) { billsChart.destroy(); billsChart = null; }
      const raw = bills
        .filter(b => (b.amount||0) > 0)
        .map((b, i) => ({ label: b.name, val: b.amount, colorIdx: i }))
        .sort((a, b) => b.val - a.val);
      const items  = raw.map(r => ({ label: r.label, val: r.val }));
      const colors = raw.map(r => BILL_COLORS[r.colorIdx % BILL_COLORS.length]);
      billsChart = makeBarChart("bills-chart", items, colors);
    }

    function renderFlowChart(income, totalBills, totalSpending, leftover) {
      if (flowChart) { flowChart.destroy(); flowChart = null; }
      const mid = [];
      if (income > 0)        mid.push({ label: "Brought In", val: income,        color: "#00f5a0" });
      if (totalBills > 0)    mid.push({ label: "Bills",       val: totalBills,    color: "#ff4d8d" });
      if (totalSpending > 0) mid.push({ label: "Her Money",   val: totalSpending, color: "#ffb800" });
      mid.sort((a, b) => b.val - a.val);
      mid.push({ label: "Left Over", val: leftover, color: leftover < 0 ? "#ff4d8d" : "#0f1e38" });
      const segments = mid.map(s => ({ label: s.label, val: s.val }));
      const colors   = mid.map(s => s.color);
      flowChart = makeDoughnut("flow-chart", segments, colors, "flow-legend", income);
    }

    function renderTagChart(bills) {
      if (tagChart) { tagChart.destroy(); tagChart = null; }
      const TAG_COLORS = {
        "Subscription":    "#a78bfa",
        "Loan / Credit":   "#ffb800",
        "Utilities":       "#00d4ff",
        "Cost of Living":  "#00f5a0",
        "Insurance":       "#ff4d8d",
        "Rent / Mortgage": "#8ba3c0",
        "Other":           "#4a6080",
      };
      const tagTotals = {};
      bills.forEach(b => {
        if (!b.tag || !(b.amount > 0)) return;
        tagTotals[b.tag] = (tagTotals[b.tag] || 0) + b.amount;
      });
      const entries = Object.entries(tagTotals).sort((a, b) => b[1] - a[1]);
      if (entries.length === 0) return;
      const total    = entries.reduce((s, [, v]) => s + v, 0);
      const segments = entries.map(([tag, val]) => ({ label: tag, val }));
      const colors   = entries.map(([tag]) => TAG_COLORS[tag] || "#4a6080");
      tagChart = makeDoughnut("tag-chart", segments, colors, "tag-legend", total);
    }

    function fmt(n) {
      return "$" + (n||0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function escHtml(str) {
      return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }
  </script>
  <script>
    const navToggle = document.getElementById("nav-toggle");
    const navDropdown = document.getElementById("nav-dropdown");
    navToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      const open = navDropdown.classList.toggle("open");
      navToggle.setAttribute("aria-expanded", open);
    });
    document.addEventListener("click", () => {
      navDropdown.classList.remove("open");
      navToggle.setAttribute("aria-expanded", false);
    });
  </script>
</body>
</html>
