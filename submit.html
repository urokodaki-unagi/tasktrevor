<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit a Request — Task Trevor</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    /* ─── Status Strip ─── */
    .status-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s, border-color 0.3s;
      position: relative;
      z-index: 9;
    }
    .status-strip.active {
      background: rgba(0,245,160,0.05);
      border-bottom-color: rgba(0,245,160,0.2);
    }
    .status-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.busy {
      background: var(--green);
      animation: pulse 2s infinite;
    }
    .status-text {
      font-size: 0.88rem;
      font-weight: 500;
      flex: 1;
      color: var(--muted);
    }
    .status-strip.active .status-text { color: var(--green); }
    .status-stage {
      display: none;
      padding: 3px 10px;
      background: rgba(0,245,160,0.1);
      color: var(--green);
      border: 1px solid rgba(0,245,160,0.25);
      border-radius: 99px;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }
    .status-pips { display: flex; gap: 5px; }
    .pip {
      width: 26px; height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      transition: background 0.3s;
    }
    .pip.done   { background: rgba(0,245,160,0.5); }
    .pip.active { background: var(--green); }
    .status-queue-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ─── Main ─── */
    .main {
      max-width: 680px;
      margin: 0 auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    /* ─── Request Type Selector ─── */
    .type-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
    .type-hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 14px;
      transition: color 0.2s;
      letter-spacing: 0.5px;
    }
    .type-hint.error { color: var(--pink); }
    .type-btn {
      padding: 7px 16px;
      border: 1px solid var(--border);
      border-radius: 99px;
      background: transparent;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s;
    }
    .type-btn:hover { border-color: var(--cyan); color: var(--cyan); }
    .type-btn.active { background: var(--cyan); border-color: var(--cyan); color: var(--bg); }

    /* ─── Form ─── */
    .form-stack { display: flex; flex-direction: column; gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .char-hint {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: -4px;
    }
    .char-hint.warn { color: var(--amber); }

    /* ─── Confirmation ─── */
    .confirm-wrap { text-align: center; padding: 8px 0; }
    .confirm-type-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 99px;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    .confirm-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--white);
      letter-spacing: 1.5px;
      margin-bottom: 8px;
    }
    .confirm-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .code-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 20px;
    }
    .code-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .code-value {
      font-family: 'DM Mono', monospace;
      font-size: 2.4rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--cyan);
    }
    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .copy-feedback {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--green);
      margin-top: 10px;
      min-height: 1em;
    }

    /* ─── Queue Status ─── */
    .stats-row { display: flex; align-items: center; gap: 20px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-item { display: flex; align-items: baseline; gap: 5px; }
    .stat-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.4rem;
      color: var(--white);
      line-height: 1;
      letter-spacing: 1px;
    }
    .stat-lbl {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }
    .stat-sep { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

    /* ─── Lookup ─── */
    .lookup-result { margin-top: 14px; }

    /* ─── Track a Request toggle ─── */
    .track-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 4px 0;
      transition: color 0.15s;
    }
    .track-toggle:hover { color: var(--cyan); }
    .track-toggle-arrow { font-size: 0.65rem; transition: transform 0.2s; color: var(--cyan); }
    .track-toggle.open .track-toggle-arrow { transform: rotate(90deg); }
    .track-body { display: none; margin-top: 16px; text-align: center; }
    .track-body.open { display: block; }
    .lookup-form-row { display: flex; gap: 10px; align-items: center; justify-content: center; }

    @media (max-width: 480px) {
      .two-col { grid-template-columns: 1fr; }
      .status-pips { display: none; }
    }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <header class="site-header">
    <div class="header-inner">
      <div class="wordmark">
        <a href="index.html" style="text-decoration:none;color:inherit;">
          <span class="wordmark-task">Task</span><span class="wordmark-trevor">Trevor</span>
        </a><span class="wordmark-divider"> · </span><span class="wordmark-portal">Submit a Request</span>
      </div>
      <div class="nav-menu">
        <button class="nav-menu-btn" id="nav-toggle">☰</button>
        <div class="nav-dropdown" id="nav-dropdown">
          <a href="index.html" class="nav-dropdown-item">Home</a>
          <a href="dashboard.html" class="nav-dropdown-item">Dashboard</a>
          <a href="admin.html" class="nav-dropdown-item">Workspace</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Live status strip -->
  <div class="status-strip">
    <div class="status-inner">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Loading...</span>
      <span class="status-stage" id="status-stage"></span>
      <div class="status-pips">
        <div class="pip" id="pip-1"></div>
        <div class="pip" id="pip-2"></div>
        <div class="pip" id="pip-3"></div>
        <div class="pip" id="pip-4"></div>
      </div>
      <span class="status-queue-label" id="status-queue-label"></span>
    </div>
  </div>

  <main class="main">

    <!-- Request Form -->
    <div class="card card-cyan anim-fadeup" id="form-card">
      <div class="card-label">New Request</div>

      <div class="type-row">
        <button class="type-btn" data-type="task">Task</button>
        <button class="type-btn" data-type="purchase">Purchase</button>
        <button class="type-btn" data-type="fix">Fix / Repair</button>
        <button class="type-btn" data-type="question">Question</button>
        <button class="type-btn" data-type="other">Other</button>
      </div>
      <p class="type-hint" id="type-hint">Select a request type above</p>

      <form id="submit-form" class="form-stack">
        <div class="two-col">
          <input type="text" id="name-input" placeholder="Your name" maxlength="80" required />
          <input type="email" id="email-input" placeholder="Email" required />
        </div>
        <input type="tel" id="phone-input" placeholder="Phone (optional)" />
        <textarea id="task-input" rows="4" maxlength="300" required placeholder="What would you like me to do?"></textarea>
        <div class="char-hint" id="char-hint">300 left</div>
        <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
      </form>
    </div>

    <!-- Confirmation (hidden until submit) -->
    <div class="card card-green anim-fadeup" id="confirm-card" style="display:none;">
      <div class="confirm-wrap">
        <div class="confirm-type-badge" id="confirm-badge">Task</div>
        <div class="confirm-headline">You're in the queue</div>
        <div class="confirm-sub">Trevor will get to your request soon.<br>Save your ticket code to check back on the status.</div>
        <div class="code-block">
          <div class="code-label">Ticket Code</div>
          <div class="code-value" id="confirm-code">TT-0000</div>
        </div>
        <div class="btn-row">
          <button class="btn-ghost" id="copy-btn">Copy Code</button>
          <button class="btn-ghost" id="another-btn">New Request</button>
        </div>
        <div class="copy-feedback" id="copy-feedback"></div>
      </div>
    </div>

    <!-- Queue Status -->
    <div class="card card-amber anim-fadeup anim-delay-2">
      <div class="card-label">Queue Status</div>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-num" id="queue-count">—</span>
          <span class="stat-lbl">waiting</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-num" id="avg-time">—</span>
          <span class="stat-lbl">avg. completion</span>
        </div>
      </div>
    </div>

    <!-- Track a Request -->
    <div class="card anim-fadeup anim-delay-3" style="text-align:center;">
      <button class="track-toggle" id="track-toggle">
        Track a Request <span class="track-toggle-arrow">▶</span>
      </button>
      <div class="track-body" id="track-body">
        <form id="lookup-form">
          <div class="lookup-form-row">
            <span class="lookup-prefix">TT-</span>
            <input type="text" id="lookup-input" placeholder="0000" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" style="max-width:120px;" />
            <button type="submit" class="submit-btn" style="width:auto;padding:12px 20px;">Look Up</button>
          </div>
        </form>
        <div class="lookup-result" id="lookup-result"></div>
      </div>
    </div>

  </main>

  <script>emailjs.init("opF4Aq6Pe2eIhhkGx");</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot,
      query, orderBy, where, getDocs, getDoc, serverTimestamp, doc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2qkcvy9_cgHlt1msPt42QbJTIwlSx5sA",
      authDomain: "work-que-16801.firebaseapp.com",
      projectId: "work-que-16801",
      storageBucket: "work-que-16801.firebasestorage.app",
      messagingSenderId: "283312462855",
      appId: "1:283312462855:web:ee0b71d588338902e1dea2"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const STAGE_LABELS = ["", "Getting Started", "In Progress", "Wrapping Up", "Complete"];

    let selectedType = null;

    // ─── Type metadata ───
    const TYPE_META = {
      task:     { label: "Task",         placeholder: "What would you like me to do?",           color: "#818cf8", bg: "rgba(99,102,241,0.15)" },
      purchase: { label: "Purchase",     placeholder: "What do you need purchased or ordered?",   color: "#ffb800", bg: "rgba(255,184,0,0.12)" },
      fix:      { label: "Fix / Repair", placeholder: "What needs fixing or attention?",          color: "#ff4d8d", bg: "rgba(255,77,141,0.12)" },
      question: { label: "Question",     placeholder: "What do you need to know?",                color: "#00d4ff", bg: "rgba(0,212,255,0.12)" },
      other:    { label: "Other",        placeholder: "What can I help with?",                    color: "#4a6080", bg: "rgba(74,96,128,0.15)" },
    };

    // ─── Type selector ───
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedType = btn.dataset.type;
        document.getElementById("task-input").placeholder = TYPE_META[selectedType].placeholder;
        const hint = document.getElementById("type-hint");
        hint.textContent = "";
        hint.classList.remove("error");
      });
    });

    // ─── Live status ───
    onSnapshot(doc(db, "meta", "current"), (snap) => {
      const data  = snap.exists() ? snap.data() : null;
      const stage = data?.stage ?? 0;
      const title = data?.title ?? null;
      const dot   = document.getElementById("status-dot");
      const text  = document.getElementById("status-text");
      const badge = document.getElementById("status-stage");
      const strip = document.querySelector(".status-strip");

      if (title || stage > 0) {
        dot.className = "status-dot busy";
        strip.classList.add("active");
        text.textContent = "Trevor is working on a request";
        if (stage > 0 && STAGE_LABELS[stage]) {
          badge.textContent    = STAGE_LABELS[stage];
          badge.style.display  = "inline-block";
        } else {
          badge.style.display  = "none";
        }
      } else {
        dot.className = "status-dot";
        strip.classList.remove("active");
        text.textContent    = "Trevor is available — submit a request below";
        badge.style.display = "none";
      }

      for (let i = 1; i <= 4; i++) {
        const pip = document.getElementById(`pip-${i}`);
        pip.className = "pip";
        if (stage === 0) continue;
        if (i < stage)   pip.classList.add("done");
        if (i === stage) pip.classList.add("active");
      }
    });

    // ─── Queue count ───
    onSnapshot(query(collection(db, "queue"), orderBy("order"), orderBy("createdAt")), (snap) => {
      document.getElementById("queue-count").textContent = snap.docs.length;
      document.getElementById("status-queue-label").textContent =
        snap.docs.length === 1 ? "1 in queue" : `${snap.docs.length} in queue`;
    });

    // ─── Avg completion time ───
    getDocs(collection(db, "done")).then((snap) => {
      const timed = snap.docs.map(d => d.data()).filter(d => (d.submittedAt || d.createdAt) && d.completedAt);
      if (timed.length >= 1) {
        const avg  = timed.reduce((s, d) => s + (d.completedAt.toDate() - (d.submittedAt || d.createdAt).toDate()), 0) / timed.length;
        const mins = Math.round(avg / 60000);
        document.getElementById("avg-time").textContent = mins < 60 ? `${mins}m` : `${Math.round(mins / 60)}h`;
      }
    });

    // ─── Char counter ───
    document.getElementById("task-input").addEventListener("input", (e) => {
      const left = 300 - e.target.value.length;
      const el   = document.getElementById("char-hint");
      el.textContent  = `${left} left`;
      el.className    = left < 50 ? "char-hint warn" : "char-hint";
    });

    // ─── Phone formatter ───
    document.getElementById("phone-input").addEventListener("input", (e) => {
      let v = e.target.value.replace(/\D/g, "").slice(0, 10);
      if      (v.length >= 7) v = `(${v.slice(0,3)}) ${v.slice(3,6)}-${v.slice(6)}`;
      else if (v.length >= 4) v = `(${v.slice(0,3)}) ${v.slice(3)}`;
      else if (v.length >  0) v = `(${v}`;
      e.target.value = v;
    });

    // ─── Unique code ───
    async function generateUniqueCode() {
      while (true) {
        const code = "TT-" + Math.floor(1000 + Math.random() * 9000);
        const [q, d] = await Promise.all([
          getDocs(query(collection(db, "queue"), where("code", "==", code))),
          getDocs(query(collection(db, "done"),  where("code", "==", code)))
        ]);
        if (q.empty && d.empty) return code;
      }
    }

    // ─── Submit ───
    document.getElementById("submit-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!selectedType) {
        const hint = document.getElementById("type-hint");
        hint.textContent = "Please select a request type before submitting.";
        hint.classList.add("error");
        return;
      }
      const btn = document.getElementById("submit-btn");
      btn.disabled    = true;
      btn.textContent = "Submitting...";

      const name  = document.getElementById("name-input").value.trim();
      const email = document.getElementById("email-input").value.trim();
      const phone = document.getElementById("phone-input").value.trim();
      const task  = document.getElementById("task-input").value.trim();
      const type  = selectedType;
      const code  = await generateUniqueCode();

      try {
        await addDoc(collection(db, "queue"), {
          title: task, submittedBy: name, email, phone, code, type,
          createdAt: serverTimestamp(), order: Date.now()
        });

        const firstName = name.split(" ")[0];
        emailjs.send("service_6cr8wdn", "template_lhp8nqo", {
          name: firstName, email, code: code.replace("TT-", "")
        }).catch(() => {});
        emailjs.send("service_6cr8wdn", "template_xnmpjnt", {
          submitter_name: name, submitter_email: email,
          submitter_phone: phone || "not provided",
          task, code: code.replace("TT-", "")
        }).catch(() => {});

        // Show confirmation
        const meta  = TYPE_META[type];
        const badge = document.getElementById("confirm-badge");
        badge.textContent       = meta.label;
        badge.style.background  = meta.bg;
        badge.style.color       = meta.color;
        document.getElementById("confirm-code").textContent = code;
        document.getElementById("form-card").style.display    = "none";
        document.getElementById("confirm-card").style.display = "block";
        document.getElementById("confirm-card").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch {
        btn.disabled    = false;
        btn.textContent = "Submit Request";
        alert("Something went wrong. Please try again.");
      }
    });

    // ─── Copy + New request ───
    document.getElementById("copy-btn").addEventListener("click", () => {
      const code = document.getElementById("confirm-code").textContent.replace("TT-", "");
      navigator.clipboard.writeText(code).then(() => {
        const fb = document.getElementById("copy-feedback");
        fb.textContent = "Copied!";
        setTimeout(() => fb.textContent = "", 2000);
      });
    });

    document.getElementById("another-btn").addEventListener("click", () => {
      document.getElementById("submit-form").reset();
      const btn = document.getElementById("submit-btn");
      btn.disabled = false;
      btn.textContent = "Submit Request";
      document.getElementById("char-hint").textContent = "300 left";
      document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
      selectedType = null;
      document.getElementById("task-input").placeholder = "What would you like me to do?";
      const hint = document.getElementById("type-hint");
      hint.textContent = "Select a request type above";
      hint.classList.remove("error");
      document.getElementById("confirm-card").style.display = "none";
      document.getElementById("form-card").style.display    = "block";
    });

    // ─── Helpers ───
    function timeSince(date) {
      const secs = Math.floor((new Date() - date) / 1000);
      if (secs < 120) return "just now";
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      return hrs === 1 ? "1 hr ago" : `${hrs} hrs ago`;
    }

    // ─── Lookup ───
    document.getElementById("lookup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const code   = "TT-" + document.getElementById("lookup-input").value.trim();
      const result = document.getElementById("lookup-result");
      result.innerHTML = `<p style="font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--muted);padding-top:10px;">Looking up ${code}...</p>`;

      const currentSnap = await getDoc(doc(db, "meta", "current"));
      const current     = currentSnap.exists() ? currentSnap.data() : null;
      if (current?.code === code) {
        const startedStr = current.startedAt ? ` · Started ${timeSince(current.startedAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard inprogress">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">In progress now</div>
          <div class="lcard-sub">${STAGE_LABELS[current.stage||1]}${startedStr}</div>
        </div>`;
        return;
      }

      const qSnap = await getDocs(query(collection(db, "queue"), where("code", "==", code)));
      if (!qSnap.empty) {
        const allSnap  = await getDocs(query(collection(db, "queue"), orderBy("order"), orderBy("createdAt")));
        const pos      = allSnap.docs.findIndex(d => d.data().code === code) + 1;
        const qData    = qSnap.docs[0].data();
        const waitStr  = qData.createdAt ? ` · Submitted ${timeSince(qData.createdAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard queued">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">Waiting in queue</div>
          <div class="lcard-sub">Position #${pos}${waitStr}</div>
        </div>`;
        return;
      }

      const dSnap = await getDocs(query(collection(db, "done"), where("code", "==", code)));
      if (!dSnap.empty) {
        const dData    = dSnap.docs[0].data();
        const doneStr  = dData.completedAt ? ` · Completed ${timeSince(dData.completedAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard done">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">Completed ✓</div>
          ${doneStr ? `<div class="lcard-sub">${doneStr.slice(3)}</div>` : ""}
        </div>`;
        return;
      }

      result.innerHTML = `<div class="lcard notfound">No ticket found for <strong>${code}</strong>.</div>`;
    });
  </script>
  <script>
    const toggle   = document.getElementById("nav-toggle");
    const dropdown = document.getElementById("nav-dropdown");
    toggle.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("open");
    });
    document.addEventListener("click", () => dropdown.classList.remove("open"));

    const trackToggle = document.getElementById("track-toggle");
    const trackBody   = document.getElementById("track-body");
    trackToggle.addEventListener("click", () => {
      trackToggle.classList.toggle("open");
      trackBody.classList.toggle("open");
    });
  </script>
</body>
</html>
