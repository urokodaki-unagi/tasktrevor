<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Trevor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f0f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    .site-header { background: #1a1a1a; color: white; padding: 20px; }
    .header-inner { max-width: 640px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .wordmark { font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 1.4rem; font-weight: 300; letter-spacing: -0.5px; }
    .wordmark strong { font-weight: 700; }
    .nav-menu { position: relative; }
    .nav-btn { padding: 7px 14px; background: white; color: #1a1a1a; border: none; border-radius: 8px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .nav-dropdown { display: none; position: absolute; top: calc(100% + 8px); right: 0; background: white; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 160px; overflow: hidden; z-index: 100; }
    .nav-dropdown.open { display: block; }
    .nav-dropdown a { display: block; padding: 12px 18px; font-size: 0.88rem; font-weight: 500; color: #1a1a1a; text-decoration: none; }
    .nav-dropdown a:hover { background: #f5f5f5; }
    .nav-dropdown a + a { border-top: 1px solid #f0f0f0; }

    /* ─── Status Strip ─── */
    .status-strip { background: white; border-bottom: 2px solid #ebebeb; transition: background 0.3s, border-color 0.3s; }
    .status-strip.active { background: #f0fdf4; border-bottom-color: #86efac; }
    .status-inner { max-width: 640px; margin: 0 auto; padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: #e5e5e5; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.busy { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
      50%       { box-shadow: 0 0 0 7px rgba(34,197,94,0.05); }
    }
    .status-text { font-size: 0.88rem; font-weight: 500; flex: 1; color: #444; }
    .status-strip.active .status-text { color: #15803d; font-weight: 600; }
    .status-stage {
      display: none;
      padding: 3px 10px;
      background: #dcfce7;
      color: #15803d;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      white-space: nowrap;
    }
    .status-pips { display: flex; gap: 5px; }
    .pip { width: 26px; height: 4px; border-radius: 2px; background: #e5e5e5; transition: background 0.3s; }
    .pip.done   { background: #86efac; }
    .pip.active { background: #22c55e; }
    .status-queue-label { font-size: 0.78rem; color: #bbb; white-space: nowrap; }

    /* ─── Main ─── */
    .main { max-width: 640px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ─── Card ─── */
    .card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
    .card-label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #bbb; margin-bottom: 20px; }

    /* ─── Request Type Selector ─── */
    .type-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .type-btn {
      padding: 8px 18px;
      border: 1.5px solid #e5e5e5;
      border-radius: 99px;
      background: white;
      font-size: 0.82rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .type-btn:hover { border-color: #ccc; color: #555; }
    .type-btn.active { background: #1a1a1a; border-color: #1a1a1a; color: white; }

    /* ─── Form ─── */
    .form-stack { display: flex; flex-direction: column; gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #1a1a1a;
      background: white;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { outline: none; border-color: #1a1a1a; }
    textarea { resize: none; }
    .char-hint { text-align: right; font-size: 0.72rem; color: #ccc; margin-top: -4px; }
    .char-hint.warn { color: #f59e0b; }
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #1a1a1a;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .submit-btn:hover { background: #333; }
    .submit-btn:disabled { background: #ccc; cursor: default; }

    /* ─── Confirmation ─── */
    .confirm-wrap { text-align: center; padding: 8px 0; }
    .confirm-type-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    .confirm-headline { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .confirm-sub { font-size: 0.85rem; color: #888; line-height: 1.55; margin-bottom: 24px; }
    .code-block { background: #f5f5f5; border-radius: 12px; padding: 18px 24px; margin-bottom: 20px; }
    .code-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #aaa; margin-bottom: 6px; }
    .code-value { font-size: 2.2rem; font-weight: 800; letter-spacing: 0.08em; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; }
    .btn-row { display: flex; gap: 10px; justify-content: center; }
    .btn-ghost { padding: 10px 22px; background: #f5f5f5; color: #1a1a1a; border: none; border-radius: 10px; font-size: 0.88rem; font-weight: 600; cursor: pointer; font-family: inherit; }
    .btn-ghost:hover { background: #ebebeb; }
    .copy-feedback { font-size: 0.75rem; color: #22c55e; margin-top: 10px; min-height: 1em; }

    /* ─── Queue + Stats ─── */
    .stats-row { display: flex; align-items: center; gap: 20px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-item { display: flex; align-items: baseline; gap: 5px; }
    .stat-num { font-size: 2rem; font-weight: 800; font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; color: #1a1a1a; line-height: 1; }
    .stat-lbl { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #bbb; }
    .stat-sep { width: 1px; height: 28px; background: #ebebeb; flex-shrink: 0; }

    /* ─── Lookup ─── */
    .lookup-form-row { display: flex; gap: 10px; align-items: center; }
    .lookup-prefix { font-size: 0.9rem; font-weight: 700; color: #aaa; white-space: nowrap; }
    .lookup-result { margin-top: 14px; }
    .lcard { padding: 14px 18px; border-radius: 10px; border-left: 4px solid #e5e5e5; }
    .lcard.queued     { border-left-color: #f59e0b; background: #fffbeb; }
    .lcard.inprogress { border-left-color: #22c55e; background: #f0fdf4; }
    .lcard.done       { border-left-color: #1a1a1a; background: #f5f5f5; }
    .lcard.notfound   { background: #f9f9f9; color: #aaa; font-size: 0.88rem; padding: 12px 16px; }
    .lcard-code   { font-weight: 800; font-size: 1rem; margin-bottom: 3px; }
    .lcard-status { font-size: 0.88rem; font-weight: 600; }
    .lcard-sub    { font-size: 0.78rem; color: #888; margin-top: 3px; }

    /* ─── Divider between queue + lookup ─── */
    .section-divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }

    @media (max-width: 480px) {
      .two-col { grid-template-columns: 1fr; }
      .status-pips { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="wordmark">Task<strong>Trevor</strong></div>
      <div class="nav-menu">
        <button class="nav-btn" id="nav-toggle">☰</button>
        <div class="nav-dropdown" id="nav-dropdown">
          <a href="dashboard.html">Dashboard</a>
          <a href="admin.html">Admin</a>
        </div>
      </div>
    </div>
  </header>

  <!-- Live status strip -->
  <div class="status-strip">
    <div class="status-inner">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Loading...</span>
      <span class="status-stage" id="status-stage"></span>
      <div class="status-pips">
        <div class="pip" id="pip-1"></div>
        <div class="pip" id="pip-2"></div>
        <div class="pip" id="pip-3"></div>
        <div class="pip" id="pip-4"></div>
      </div>
      <span class="status-queue-label" id="status-queue-label"></span>
    </div>
  </div>

  <main class="main">

    <!-- Request Form -->
    <div class="card" id="form-card">
      <div class="card-label">New Request</div>

      <div class="type-row">
        <button class="type-btn active" data-type="task">Task</button>
        <button class="type-btn" data-type="purchase">Purchase</button>
        <button class="type-btn" data-type="fix">Fix / Repair</button>
        <button class="type-btn" data-type="question">Question</button>
        <button class="type-btn" data-type="other">Other</button>
      </div>

      <form id="submit-form" class="form-stack">
        <div class="two-col">
          <input type="text" id="name-input" placeholder="Your name" maxlength="80" required />
          <input type="email" id="email-input" placeholder="Email" required />
        </div>
        <input type="tel" id="phone-input" placeholder="Phone (optional)" />
        <textarea id="task-input" rows="4" maxlength="300" required placeholder="What would you like me to do?"></textarea>
        <div class="char-hint" id="char-hint">300 left</div>
        <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
      </form>
    </div>

    <!-- Confirmation (hidden until submit) -->
    <div class="card" id="confirm-card" style="display:none;">
      <div class="confirm-wrap">
        <div class="confirm-type-badge" id="confirm-badge">Task</div>
        <div class="confirm-headline">You're in the queue</div>
        <div class="confirm-sub">Trevor will get to your request soon.<br>Save your ticket code to check back on the status.</div>
        <div class="code-block">
          <div class="code-label">Ticket Code</div>
          <div class="code-value" id="confirm-code">TT-0000</div>
        </div>
        <div class="btn-row">
          <button class="btn-ghost" id="copy-btn">Copy Code</button>
          <button class="btn-ghost" id="another-btn">New Request</button>
        </div>
        <div class="copy-feedback" id="copy-feedback"></div>
      </div>
    </div>

    <!-- Queue info + Lookup -->
    <div class="card">
      <div class="card-label">Queue Status</div>
      <div class="stats-row">
        <div class="stat-item">
          <span class="stat-num" id="queue-count">—</span>
          <span class="stat-lbl">waiting</span>
        </div>
        <div class="stat-sep"></div>
        <div class="stat-item">
          <span class="stat-num" id="avg-time">—</span>
          <span class="stat-lbl">avg. completion</span>
        </div>
      </div>

      <hr class="section-divider" />

      <div class="card-label" style="margin-bottom:14px;">Track a Request</div>
      <form id="lookup-form">
        <div class="lookup-form-row">
          <span class="lookup-prefix">TT-</span>
          <input type="text" id="lookup-input" placeholder="0000" maxlength="4" pattern="[0-9]{4}" inputmode="numeric" style="max-width:120px;" />
          <button type="submit" class="submit-btn" style="width:auto;padding:12px 20px;">Look Up</button>
        </div>
      </form>
      <div class="lookup-result" id="lookup-result"></div>
    </div>

  </main>

  <script>emailjs.init("opF4Aq6Pe2eIhhkGx");</script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, onSnapshot,
      query, orderBy, where, getDocs, getDoc, serverTimestamp, doc
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2qkcvy9_cgHlt1msPt42QbJTIwlSx5sA",
      authDomain: "work-que-16801.firebaseapp.com",
      projectId: "work-que-16801",
      storageBucket: "work-que-16801.firebasestorage.app",
      messagingSenderId: "283312462855",
      appId: "1:283312462855:web:ee0b71d588338902e1dea2"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    const STAGE_LABELS = ["", "Getting Started", "In Progress", "Wrapping Up", "Complete"];

    let selectedType = "task";

    // ─── Type metadata ───
    const TYPE_META = {
      task:     { label: "Task",         placeholder: "What would you like me to do?",           color: "#6366f1", bg: "#eef2ff" },
      purchase: { label: "Purchase",     placeholder: "What do you need purchased or ordered?",   color: "#f59e0b", bg: "#fffbeb" },
      fix:      { label: "Fix / Repair", placeholder: "What needs fixing or attention?",          color: "#ef4444", bg: "#fef2f2" },
      question: { label: "Question",     placeholder: "What do you need to know?",                color: "#3b82f6", bg: "#eff6ff" },
      other:    { label: "Other",        placeholder: "What can I help with?",                    color: "#6b7280", bg: "#f9fafb" },
    };

    // ─── Type selector ───
    document.querySelectorAll(".type-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedType = btn.dataset.type;
        document.getElementById("task-input").placeholder = TYPE_META[selectedType].placeholder;
      });
    });

    // ─── Live status ───
    onSnapshot(doc(db, "meta", "current"), (snap) => {
      const data  = snap.exists() ? snap.data() : null;
      const stage = data?.stage ?? 0;
      const title = data?.title ?? null;
      const dot   = document.getElementById("status-dot");
      const text  = document.getElementById("status-text");
      const badge = document.getElementById("status-stage");
      const strip = document.querySelector(".status-strip");

      if (title || stage > 0) {
        dot.className = "status-dot busy";
        strip.classList.add("active");
        text.textContent = "Trevor is working on a request";
        if (stage > 0 && STAGE_LABELS[stage]) {
          badge.textContent    = STAGE_LABELS[stage];
          badge.style.display  = "inline-block";
        } else {
          badge.style.display  = "none";
        }
      } else {
        dot.className = "status-dot";
        strip.classList.remove("active");
        text.textContent    = "Trevor is available — submit a request below";
        badge.style.display = "none";
      }

      for (let i = 1; i <= 4; i++) {
        const pip = document.getElementById(`pip-${i}`);
        pip.className = "pip";
        if (stage === 0) continue;
        if (i < stage)   pip.classList.add("done");
        if (i === stage) pip.classList.add("active");
      }
    });

    // ─── Queue count ───
    onSnapshot(query(collection(db, "queue"), orderBy("order"), orderBy("createdAt")), (snap) => {
      document.getElementById("queue-count").textContent = snap.docs.length;
      document.getElementById("status-queue-label").textContent =
        snap.docs.length === 1 ? "1 in queue" : `${snap.docs.length} in queue`;
    });

    // ─── Avg completion time ───
    getDocs(collection(db, "done")).then((snap) => {
      const timed = snap.docs.map(d => d.data()).filter(d => (d.submittedAt || d.createdAt) && d.completedAt);
      if (timed.length >= 1) {
        const avg  = timed.reduce((s, d) => s + (d.completedAt.toDate() - (d.submittedAt || d.createdAt).toDate()), 0) / timed.length;
        const mins = Math.round(avg / 60000);
        document.getElementById("avg-time").textContent = mins < 60 ? `${mins}m` : `${Math.round(mins / 60)}h`;
      }
    });

    // ─── Char counter ───
    document.getElementById("task-input").addEventListener("input", (e) => {
      const left = 300 - e.target.value.length;
      const el   = document.getElementById("char-hint");
      el.textContent  = `${left} left`;
      el.className    = left < 50 ? "char-hint warn" : "char-hint";
    });

    // ─── Phone formatter ───
    document.getElementById("phone-input").addEventListener("input", (e) => {
      let v = e.target.value.replace(/\D/g, "").slice(0, 10);
      if      (v.length >= 7) v = `(${v.slice(0,3)}) ${v.slice(3,6)}-${v.slice(6)}`;
      else if (v.length >= 4) v = `(${v.slice(0,3)}) ${v.slice(3)}`;
      else if (v.length >  0) v = `(${v}`;
      e.target.value = v;
    });

    // ─── Unique code ───
    async function generateUniqueCode() {
      while (true) {
        const code = "TT-" + Math.floor(1000 + Math.random() * 9000);
        const [q, d] = await Promise.all([
          getDocs(query(collection(db, "queue"), where("code", "==", code))),
          getDocs(query(collection(db, "done"),  where("code", "==", code)))
        ]);
        if (q.empty && d.empty) return code;
      }
    }

    // ─── Submit ───
    document.getElementById("submit-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      btn.disabled    = true;
      btn.textContent = "Submitting...";

      const name  = document.getElementById("name-input").value.trim();
      const email = document.getElementById("email-input").value.trim();
      const phone = document.getElementById("phone-input").value.trim();
      const task  = document.getElementById("task-input").value.trim();
      const type  = selectedType;
      const code  = await generateUniqueCode();

      try {
        await addDoc(collection(db, "queue"), {
          title: task, submittedBy: name, email, phone, code, type,
          createdAt: serverTimestamp(), order: Date.now()
        });

        const firstName = name.split(" ")[0];
        emailjs.send("service_6cr8wdn", "template_lhp8nqo", {
          name: firstName, email, code: code.replace("TT-", "")
        }).catch(() => {});
        emailjs.send("service_6cr8wdn", "template_xnmpjnt", {
          submitter_name: name, submitter_email: email,
          submitter_phone: phone || "not provided",
          task, code: code.replace("TT-", "")
        }).catch(() => {});

        // Show confirmation
        const meta  = TYPE_META[type];
        const badge = document.getElementById("confirm-badge");
        badge.textContent       = meta.label;
        badge.style.background  = meta.bg;
        badge.style.color       = meta.color;
        document.getElementById("confirm-code").textContent = code;
        document.getElementById("form-card").style.display    = "none";
        document.getElementById("confirm-card").style.display = "block";
        document.getElementById("confirm-card").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch {
        btn.disabled    = false;
        btn.textContent = "Submit Request";
        alert("Something went wrong. Please try again.");
      }
    });

    // ─── Copy + New request ───
    document.getElementById("copy-btn").addEventListener("click", () => {
      const code = document.getElementById("confirm-code").textContent.replace("TT-", "");
      navigator.clipboard.writeText(code).then(() => {
        const fb = document.getElementById("copy-feedback");
        fb.textContent = "Copied!";
        setTimeout(() => fb.textContent = "", 2000);
      });
    });

    document.getElementById("another-btn").addEventListener("click", () => {
      document.getElementById("submit-form").reset();
      document.getElementById("char-hint").textContent = "300 left";
      document.querySelectorAll(".type-btn").forEach(b => b.classList.remove("active"));
      document.querySelector("[data-type='task']").classList.add("active");
      selectedType = "task";
      document.getElementById("task-input").placeholder = TYPE_META.task.placeholder;
      document.getElementById("confirm-card").style.display = "none";
      document.getElementById("form-card").style.display    = "block";
    });

    // ─── Helpers ───
    function timeSince(date) {
      const secs = Math.floor((new Date() - date) / 1000);
      if (secs < 120) return "just now";
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      return hrs === 1 ? "1 hr ago" : `${hrs} hrs ago`;
    }

    // ─── Lookup ───
    document.getElementById("lookup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const code   = "TT-" + document.getElementById("lookup-input").value.trim();
      const result = document.getElementById("lookup-result");
      result.innerHTML = `<p style="font-size:0.85rem;color:#aaa;padding-top:10px;">Looking up ${code}...</p>`;

      const currentSnap = await getDoc(doc(db, "meta", "current"));
      const current     = currentSnap.exists() ? currentSnap.data() : null;
      if (current?.code === code) {
        const startedStr = current.startedAt ? ` · Started ${timeSince(current.startedAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard inprogress">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">In progress now</div>
          <div class="lcard-sub">${STAGE_LABELS[current.stage||1]}${startedStr}</div>
        </div>`;
        return;
      }

      const qSnap = await getDocs(query(collection(db, "queue"), where("code", "==", code)));
      if (!qSnap.empty) {
        const allSnap  = await getDocs(query(collection(db, "queue"), orderBy("order"), orderBy("createdAt")));
        const pos      = allSnap.docs.findIndex(d => d.data().code === code) + 1;
        const qData    = qSnap.docs[0].data();
        const waitStr  = qData.createdAt ? ` · Submitted ${timeSince(qData.createdAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard queued">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">Waiting in queue</div>
          <div class="lcard-sub">Position #${pos}${waitStr}</div>
        </div>`;
        return;
      }

      const dSnap = await getDocs(query(collection(db, "done"), where("code", "==", code)));
      if (!dSnap.empty) {
        const dData    = dSnap.docs[0].data();
        const doneStr  = dData.completedAt ? ` · Completed ${timeSince(dData.completedAt.toDate())}` : "";
        result.innerHTML = `<div class="lcard done">
          <div class="lcard-code">${code}</div>
          <div class="lcard-status">Completed ✓</div>
          ${doneStr ? `<div class="lcard-sub">${doneStr.slice(3)}</div>` : ""}
        </div>`;
        return;
      }

      result.innerHTML = `<div class="lcard notfound">No ticket found for <strong>${code}</strong>.</div>`;
    });
  </script>
  <script>
    const toggle   = document.getElementById("nav-toggle");
    const dropdown = document.getElementById("nav-dropdown");
    toggle.addEventListener("click", (e) => {
      e.stopPropagation();
      dropdown.classList.toggle("open");
    });
    document.addEventListener("click", () => dropdown.classList.remove("open"));
  </script>
</body>
</html>
